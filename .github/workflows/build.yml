name: Build binaries (Nuitka)

# Build standalone one-file Windows binaries for cli.py and server.py with
# Nuitka. windows-latest already ships MSVC, which Nuitka auto-detects — the same
# toolchain used to build locally. Mirrors build_nuitka.ps1.
on:
  push:
    tags:
      - "v*"          # build + publish a Release on version tags (e.g. v1.0.0)
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write      # create / upload a GitHub Release
  id-token: write      # OIDC token for build-provenance attestation
  attestations: write  # write the provenance attestation to the attestations store

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cli
            script: cli.py
            product: ComfyUI API CLI
            # CLI is lean: api/utils + Pillow + requests_toolbelt + websocket-client.
            packages: |
              api
              utils
              PIL
              requests_toolbelt
              websocket
          - name: server
            script: server.py
            product: ComfyUI API Server
            # Server needs the full ASGI/uvicorn stack; much of it is imported by
            # string at runtime and would be missed by static analysis.
            packages: |
              api
              utils
              uvicorn
              fastapi
              starlette
              anyio
              h11
              websockets
              httptools
              watchfiles
              multipart

    name: build-${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Workflows are intentionally NOT bundled (--include-data-dir is omitted):
      # they reference the model/checkpoint names installed in a specific ComfyUI,
      # so they ship as a folder next to the exe instead (staged below).
      - name: Build ${{ matrix.name }} (Nuitka)
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: ${{ matrix.script }}
          mode: onefile
          output-dir: build
          company-name: comfyui-api
          product-name: ${{ matrix.product }}
          product-version: 1.0.0
          include-package: ${{ matrix.packages }}

      - name: Stage exe + sha256 + workflows folder
        shell: pwsh
        run: |
          $out = "dist-${{ matrix.name }}"
          New-Item -ItemType Directory -Force $out | Out-Null
          # Nuitka onefile output lands at build\<script-stem>.exe
          $exe = Get-ChildItem build -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "no .exe produced under build\" }
          $exePath = Join-Path $out "${{ matrix.name }}.exe"
          Copy-Item $exe.FullName $exePath
          # Publish a SHA-256 checksum next to the exe (inside the zip) so users
          # can verify the binary. Format: "<hash>  <filename>" (sha256sum style).
          $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.name }}.exe" | Set-Content -Encoding ascii -NoNewline "$exePath.sha256"
          # Ship an (empty) workflows\ folder beside the exe — workflows are
          # environment-specific and NOT bundled; the user drops their own here.
          $wf = Join-Path $out "workflows"
          New-Item -ItemType Directory -Force $wf | Out-Null
          @"
          Put your Export(API)-format ComfyUI workflow .json files in this folder
          (next to the .exe), or point the CLI at another dir with --workflow-dir.
          "@ | Set-Content -Encoding utf8 (Join-Path $wf "README.txt")
          Get-ChildItem $out -Recurse | Select-Object FullName, Length

      # Cryptographic build provenance (SLSA) for the executable itself. Only on
      # tag releases — on manual dispatch there is no release to tie it to, and
      # attestation of throwaway builds just clutters the attestations store.
      - name: Attest exe provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist-${{ matrix.name }}/${{ matrix.name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comfyui-api-${{ matrix.name }}-windows
          path: dist-${{ matrix.name }}/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip each target + checksums
        run: |
          cd artifacts
          for d in */; do
            name="${d%/}"
            (cd "$d" && zip -r "../${name}.zip" .)
            # sha256sum-format checksum next to each zip (verify: sha256sum -c <file>.sha256)
            sha256sum "${name}.zip" > "${name}.zip.sha256"
          done
          ls -la ./*.zip ./*.sha256

      # Attest provenance for the published archives (in addition to the per-exe
      # attestation from the build jobs).
      - name: Attest zip provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: artifacts/*.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.zip.sha256
          generate_release_notes: true
